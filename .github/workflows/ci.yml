name: QA Automation CI

on:
   push:
      branches:[main]
   pull_request:
       branches:[main]

jobs:
   test:  
      runs-on:ubuntu-latest

      steps:
        -name:Checkout code
         uses:actions

        -name:Set up Python
         uses:actions
         with:
            python-version:"3.11"

        -name:Install dependencies
         run:pip install pytest

        -name:Run pytest
         run:pytest -v    